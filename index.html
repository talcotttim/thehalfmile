<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Half Mile at Terra Cotta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #2d4a2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }

    .photo {
      width: 100%;
      max-width: 720px;
      display: block;
    }

    .caption {
      margin-top: 28px;
      text-align: center;
      padding: 0 20px 40px;
    }

    .caption a {
      color: #e8d48a;
      font-size: 18px;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 212, 138, 0.4);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .caption a:hover {
      border-color: #e8d48a;
    }
  </style>
</head>
<body>

  <img
    class="photo"
    src="Images/The Half Mile at Terra Cotta GRAM.JPEG"
    alt="The Half Mile at Terra Cotta"
  />

  <div class="caption">
    <a href="https://www.instagram.com/thehalfmile" target="_blank" rel="noopener">
      Follow our construction on Instagram
    </a>
  </div>

</body>
</html>
